name: Deploy to cPanel

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload to cPanel public_html
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_PASSWORD: ${{ secrets.CPANEL_PASSWORD }}
          CPANEL_REMOTE_DIR: ${{ secrets.CPANEL_REMOTE_DIR }}
        run: |
          if [ -z "$CPANEL_HOST" ] || [ -z "$CPANEL_USER" ] || [ -z "$CPANEL_PASSWORD" ]; then
            echo "Missing one or more required secrets: CPANEL_HOST, CPANEL_USER, CPANEL_PASSWORD"
            exit 1
          fi

          REMOTE_DIR="${CPANEL_REMOTE_DIR:-public_html}"
          PORT="${CPANEL_PORT:-21}"

          lftp -u "$CPANEL_USER","$CPANEL_PASSWORD" -p "$PORT" "$CPANEL_HOST" <<EOF
          set ftp:ssl-allow true
          set ssl:verify-certificate no
          set net:max-retries 2
          set net:timeout 20
          mirror -R --delete --verbose out/ $REMOTE_DIR
          bye
          EOF
